<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>llmconduit debug</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101214;
      --panel: #171a1f;
      --panel-2: #1f242a;
      --line: #303741;
      --text: #edf1f5;
      --muted: #9aa6b2;
      --blue: #6bb6ff;
      --green: #58d68d;
      --amber: #f6c453;
      --red: #ff6b6b;
      --tool: #f6c453;
      --tool-bg: #2a2410;
      --reasoning: #7a828c;
      --request: #ffffff;
      --output: #c7ced6;
      --meta: #c58bd1;
      --shadow: rgba(0, 0, 0, 0.24);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    button, input { font: inherit; }

    .app {
      display: grid;
      grid-template-columns: minmax(200px, 16vw) minmax(0, 1fr);
      height: 100%;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: var(--panel);
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      min-height: 56px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
    }

    .brand {
      font-weight: 650;
      font-size: 15px;
      white-space: nowrap;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1;
      justify-content: flex-end;
    }

    socket-indicator {
      display: inline-flex;
      align-items: center;
      flex: none;
    }

    socket-indicator .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--amber);
    }

    socket-indicator[state="open"] .dot { background: var(--green); }
    socket-indicator[state="closed"] .dot,
    socket-indicator[state="error"] .dot { background: var(--red); }

    request-search {
      display: inline-flex;
      align-items: center;
      min-width: 0;
    }

    request-search[open] {
      flex: 1;
      width: 100%;
    }

    .topbar:has(request-search[open]) .topbar-actions {
      justify-content: stretch;
    }

    request-search .search-icon-btn {
      background: transparent;
      border: 0;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      display: inline-flex;
      align-items: center;
      border-radius: 4px;
    }

    request-search .search-icon-btn:hover { color: var(--text); background: var(--panel-2); }

    request-search .search-form {
      display: none;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }

    request-search[open] .search-form { display: inline-flex; }
    request-search[open] .search-icon-btn { display: none; }

    request-search input {
      flex: 1;
      min-width: 0;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      outline: none;
    }

    request-search input:focus { border-color: var(--blue); }

    request-search .search-clear {
      background: transparent;
      border: 0;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
    }

    request-search .search-clear:hover { color: var(--text); background: var(--panel-2); }

    /* When search is open, hide the brand/socket so the input can fill the topbar. */
    .topbar:has(request-search[open]) .brand { display: none; }
    .topbar:has(request-search[open]) socket-indicator { display: none; }

    request-list {
      display: block;
      flex: 1 1 0;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 8px;
      scrollbar-width: thin;
      scrollbar-color: var(--line) transparent;
    }

    request-list::-webkit-scrollbar { width: 6px; }
    request-list::-webkit-scrollbar-thumb {
      background: var(--line);
      border-radius: 3px;
    }

    .request-button {
      width: 100%;
      display: block;
      text-align: left;
      background: transparent;
      color: var(--text);
      border: 1px solid transparent;
      border-radius: 7px;
      padding: 10px;
      cursor: pointer;
      min-width: 0;
      margin-bottom: 2px;
      contain: layout paint;
    }

    .request-button:hover { background: var(--panel-2); }
    .request-button.selected {
      border-color: #4e9de6;
      background: #1b2835;
    }
    .request-button.dashboard { font-weight: 650; }

    .dashboard-icon {
      flex: none;
      color: var(--blue);
      margin-right: 2px;
    }

    .request-button.dashboard:not(.selected) .dashboard-icon { color: var(--muted); }

    .request-head {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .request-id, .model, .summary-line, .metric {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .request-id {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: var(--text);
      font-size: 12px;
      min-width: 0;
      flex: 1;
    }

    .dashboard-label {
      color: var(--text);
      font-size: 13px;
      min-width: 0;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .head-time {
      flex: none;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .head-time:empty { display: none; }

    .badge {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 11px;
      line-height: 16px;
      color: var(--muted);
      flex: none;
    }

    .badge.running { color: var(--amber); border-color: rgba(246, 196, 83, 0.45); }
    .badge.dashboard-count { color: var(--text); }
    .badge.completed { color: var(--green); border-color: rgba(88, 214, 141, 0.45); }
    .badge.failed { color: var(--red); border-color: rgba(255, 107, 107, 0.45); }

    /* Icon-only variant: small circular chip hosting an SVG status glyph. */
    .badge.status-icon {
      width: 18px;
      height: 18px;
      padding: 0;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .badge.status-icon svg { display: block; }
    .badge.status-icon.running svg { animation: status-pulse 1.4s ease-in-out infinite; }

    @keyframes status-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .model {
      margin-top: 7px;
      color: var(--blue);
      font-size: 13px;
    }

    .msg-preview {
      margin-top: 6px;
      font-size: 12px;
      line-height: 1.35;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
      letter-spacing: -0.4px;
    }
    .msg-preview.user { color: var(--text); }
    .msg-preview.assistant { color: var(--output); opacity: 0.85; }
    .msg-preview[data-empty] { display: none; }

    .metrics {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
    }

    .metric {
      color: var(--muted);
      font-size: 11px;
    }

    .content {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: #111417;
      overflow: hidden;
    }

    live-dashboard, request-detail {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .detail-head {
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      padding: 12px 16px;
      display: grid;
      gap: 8px;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .title {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 14px;
    }

    .title-model {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 40%;
    }

    .summary-line {
      color: var(--muted);
      font-size: 12px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      padding-top: 2px;
      overflow-x: auto;
    }

    .tab {
      color: var(--muted);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      white-space: nowrap;
    }

    .tab.active {
      color: var(--text);
      border-color: var(--line);
      background: var(--panel-2);
    }

    .pane {
      overflow: auto;
      min-height: 0;
      flex: 1;
      padding: 14px 16px 32px;
    }

    .empty {
      color: var(--muted);
      display: grid;
      place-items: center;
      min-height: 50vh;
      font-size: 14px;
    }

    .segment {
      margin: 0 0 10px;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.55;
    }

    .segment.reasoning { color: var(--reasoning); font-style: italic; }
    .segment.tool { color: var(--tool); background: var(--tool-bg); padding: 4px 8px; border-radius: 4px; font-weight: 600; }

    .payload {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
      color: #dfe7ef;
      background: #0d0f12;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 12px;
      box-shadow: 0 12px 24px var(--shadow);
    }

    .image-list { display: grid; gap: 10px; margin: 10px 0; }
    .event-image {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #0d0f12;
      padding: 10px;
    }
    .event-image img {
      display: block;
      max-width: 100%;
      max-height: 360px;
      object-fit: contain;
      background: #08090a;
      border-radius: 5px;
    }
    .image-caption {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      overflow-wrap: anywhere;
    }

    .event { border-bottom: 1px solid var(--line); padding: 10px 0; }
    .event summary { cursor: pointer; color: var(--text); list-style: none; }
    .event summary::-webkit-details-marker { display: none; }
    .event-meta {
      display: flex;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
      min-width: 0;
    }
    .event-kind {
      color: var(--blue);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .event-summary {
      color: var(--text);
      font-size: 13px;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .accordion {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel-2);
      margin-bottom: 10px;
      overflow: hidden;
    }
    .accordion > .accordion-summary {
      cursor: pointer;
      list-style: none;
      padding: 8px 12px;
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }
    .accordion > .accordion-summary::-webkit-details-marker { display: none; }
    .accordion > .accordion-summary::before {
      content: "▸";
      display: inline-block;
      width: 10px;
      color: var(--muted);
      transition: transform 0.1s ease;
    }
    .accordion[open] > .accordion-summary::before { transform: rotate(90deg); }
    .accordion-role { color: var(--muted); }
    .accordion.role-system .accordion-role { color: var(--blue); }
    .accordion.role-user .accordion-role { color: var(--text); }
    .accordion.role-assistant .accordion-role { color: var(--text); }
    .accordion.role-reasoning .accordion-role { color: var(--reasoning); }
    .accordion.role-tool .accordion-role { color: var(--tool); }
    .accordion.tool-call > .accordion-summary .accordion-role { color: var(--tool); }
    .accordion.tool-result > .accordion-summary .accordion-role { color: var(--green); }
    .accordion > .segment {
      margin: 0;
      padding: 10px 12px;
      border-top: 1px solid var(--line);
      background: #0d0f12;
    }
    .accordion > .segment.tool-payload {
      color: var(--output);
      font-weight: 400;
      font-style: normal;
    }
    .accordion-summary .tool-call-id {
      margin-left: auto;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
    }
    .accordion.stale > .accordion-summary { opacity: 0.6; }
    .accordion.stale > .accordion-summary .accordion-role { color: var(--muted); }

    .raw-section-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: 16px 0 6px;
    }
    .raw-section-label:first-child { margin-top: 0; }
    .raw-subhead {
      color: var(--muted);
      font-size: 11px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      margin: 8px 0 4px;
    }
    .raw-empty {
      color: var(--muted);
      font-size: 13px;
      padding: 8px 0;
    }

    /* Dashboard grid -- tile count drives the layout shape so visible tiles
       always fill the viewport. */
    .dashboard-grid {
      display: grid;
      gap: 10px;
      padding: 10px;
      flex: 1;
      min-height: 0;
      overflow: auto;
    }

    /* 0 / 1: one full-screen tile (or the empty placeholder). */
    .dashboard-grid.n-0,
    .dashboard-grid.n-1 {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
    }

    /* 2: side by side, each fills the full height. */
    .dashboard-grid.n-2 {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr;
    }

    /* 3: two tiles on top, one wide tile spanning the bottom row. */
    .dashboard-grid.n-3 {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
    }
    .dashboard-grid.n-3 > :nth-child(3) {
      grid-column: 1 / -1;
    }

    /* 4: 2x2 equal grid. */
    .dashboard-grid.n-4 {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
    }

    /* 5+: fall back to a 3-column auto-flow grid with comfortably tall rows
       so each tile stays readable even when there are many. */
    .dashboard-grid.n-many {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-auto-rows: minmax(240px, 1fr);
    }

    .dashboard-empty {
      grid-column: 1 / -1;
      color: var(--muted);
      display: grid;
      place-items: center;
      min-height: 50vh;
      font-size: 14px;
    }

    request-tile {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0d0f12;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      /* Streaming text growth inside a tile must not invalidate sibling
         tiles' layout. The grid sizes our box from outside, so we can
         contain layout/paint/style without contain: size. */
      contain: layout paint style;
    }

    request-tile[status="running"] { border-color: rgba(107, 182, 255, 0.55); }
    request-tile[status="completed"] { border-color: rgba(88, 214, 141, 0.55); }
    request-tile[status="failed"] { border-color: rgba(255, 107, 107, 0.55); }

    request-tile .tile-title {
      padding: 6px 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      font-weight: 700;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    request-tile .tile-title:hover { background: var(--panel-2); }

    request-tile .tile-title .title-main {
      flex: 1 1 auto;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    request-tile .tile-title .title-linger {
      flex: 0 0 auto;
      margin-left: auto;
      color: var(--muted);
      font-weight: 500;
      font-size: 11px;
      white-space: nowrap;
    }

    request-tile .tile-title .title-linger:empty { display: none; }

    request-tile[status="running"] .tile-title { color: var(--blue); }
    request-tile[status="completed"] .tile-title { color: var(--green); }
    request-tile[status="failed"] .tile-title { color: var(--red); }

    request-tile .tile-body {
      flex: 1 1 0;
      /* min-height: 0 lets the body shrink below its content size in the flex
         column, which is what activates the overflow scrollbar. Without it the
         flex item would grow with its content and never scroll. */
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 8px 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      scrollbar-width: thin;
      scrollbar-color: var(--line) transparent;
      contain: layout paint;
    }

    request-tile .tile-body::-webkit-scrollbar { width: 6px; }
    request-tile .tile-body::-webkit-scrollbar-track { background: transparent; }
    request-tile .tile-body::-webkit-scrollbar-thumb {
      background: var(--line);
      border-radius: 3px;
    }
    request-tile .tile-body::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    .sk-request { color: var(--request); font-weight: 700; }
    .sk-output { color: var(--output); }
    .sk-reasoning { color: var(--reasoning); font-style: italic; }
    .sk-tool { color: var(--tool); background: var(--tool-bg); font-weight: 700; }
    .sk-meta { color: var(--meta); opacity: 0.85; }
    .sk-error { color: var(--red); font-weight: 700; }

    reasoning-block {
      display: block;
      margin: 4px 0;
      contain: layout paint;
    }

    reasoning-block summary {
      cursor: pointer;
      list-style: none;
      color: var(--reasoning);
      font-style: italic;
      font-size: 11px;
      padding: 2px 0;
      user-select: none;
    }

    reasoning-block summary::-webkit-details-marker { display: none; }
    reasoning-block summary::before {
      content: "▸ ";
      display: inline-block;
      width: 12px;
    }
    reasoning-block details[open] > summary::before { content: "▾ "; }

    reasoning-block .reasoning-body {
      padding: 0 8px 0 12px;
      border-left: 1px solid var(--line);
      margin-top: 2px;
      color: var(--reasoning);
      font-style: italic;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    @media (max-width: 820px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(210px, 38vh) minmax(0, 1fr);
      }
      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
<main class="app">
  <aside class="sidebar">
    <div class="topbar">
      <div class="brand">llmconduit debug</div>
      <div class="topbar-actions">
        <socket-indicator state="connecting"></socket-indicator>
        <request-search></request-search>
      </div>
    </div>
    <request-list></request-list>
  </aside>
  <section class="content" id="content"></section>
</main>

<script type="module" src="/debug/app.js"></script>
</body>
</html>
